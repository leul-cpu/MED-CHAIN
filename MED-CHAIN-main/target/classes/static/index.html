<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Medical Records</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Animated Background Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div id="toast-container"></div>

<div id="login-screen" class="premium-glass">
    <div class="login-header">
        <div class="logo-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
        </div>
        <h2>MED-CHAIN</h2>
        <p>Secure Medical Records Gateway</p>
    </div>

    <div class="login-box">
        <div class="demo-hints">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            <span><strong>Demo:</strong> admin / doctor / patient</span>
        </div>
        
        <div class="input-group premium-input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <input type="text" id="user" placeholder="Username" autocomplete="off">
        </div>
        
        <div class="input-group premium-input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="pass" placeholder="Password">
        </div>
        
        <button onclick="login()" class="login-btn premium-btn">
            <span>Authenticate</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </div>
</div>

<div id="dashboard" class="hidden glass-panel">

    <nav>
        <h1>Staff Portal</h1>
        <div>
            <button id="admin-users-btn" onclick="openUserModal()" class="action-btn hidden" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); margin-right: 10px;">Manage Users</button>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">

        <div id="doctor-section" style="display:none;">
            <h3>Add New Patient Entry</h3>

            <div class="form-grid">
                <input type="text" id="pName" placeholder="Patient Name">
                <input type="text" id="pCond" placeholder="Condition">

                <input type="text" id="pHospital" placeholder="Hospital Name">
                <input type="text" id="pDoctor" placeholder="Doctor Name">

                <input type="text" id="pMedication" placeholder="Medication">
                <input type="text" id="pDuration" placeholder="Duration (e.g. 7 days)">

                <input type="text" id="pUsername" placeholder="Patient Username">
                <input type="file" id="pFile" style="padding: 10px;">
            </div>

            <button onclick="saveEntry()" class="save-btn">Save Record</button>
        </div>

        <div class="table-container">
            <h3>Medical History Logs</h3>
            <div class="search-container" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="searchInput"
                       placeholder="🔍 Search by Patient Name..."
                       onkeyup="if(event.key === 'Enter') { currentPage = 0; searchTable(); }"
                       style="margin: 0; flex: 1;">
                <button onclick="currentPage = 0; searchTable()" style="width: auto; margin: 0; padding: 0 24px;">Search</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Patient Name</th>
                        <th>Condition</th>
                        <th>Hospital</th>
                        <th>Doctor</th>
                        <th>Medication</th>
                        <th>Duration</th>
                        <th>Attachment</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

            <div class="pagination-controls" style="display: flex; justify-content: center; gap: 20px; margin-top: 20px; align-items: center;">
                <button onclick="prevPage()" id="btn-prev" style="width: auto; padding: 8px 16px;">Previous</button>
                <span id="page-info" style="font-weight: 600;">Page 1</span>
                <button onclick="nextPage()" id="btn-next" style="width: auto; padding: 8px 16px;">Next</button>
            </div>

        </div>

    </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal hidden">
    <div class="modal-content glass-panel">
        <span class="close-btn" onclick="closeEditModal()">&times;</span>
        <h3>Edit Medical Record</h3>
        <input type="hidden" id="eId">
        <div class="form-grid">
            <input type="text" id="eName" placeholder="Patient Name">
            <input type="text" id="eCond" placeholder="Condition">
            <input type="text" id="eHospital" placeholder="Hospital Name">
            <input type="text" id="eDoctor" placeholder="Doctor Name">
            <input type="text" id="eMedication" placeholder="Medication">
            <input type="text" id="eDuration" placeholder="Duration">
            <input type="text" id="eUsername" placeholder="Patient Username">
        </div>
        <button onclick="submitEdit()" class="save-btn" style="margin-top: 15px;">Update Record</button>
    </div>
</div>

<!-- User Management Modal -->
<div id="user-modal" class="modal hidden">
    <div class="modal-content glass-panel" style="max-width: 600px;">
        <span class="close-btn" onclick="closeUserModal()">&times;</span>
        <h3>User Management</h3>
        
        <div class="form-grid" style="margin-bottom: 20px;">
            <input type="text" id="uName" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <select id="uRole" style="padding: 16px; border-radius: 12px; border: none; background: rgba(241, 245, 249, 0.9);">
                <option value="ROLE_PATIENT">Patient</option>
                <option value="ROLE_DOCTOR">Doctor</option>
                <option value="ROLE_ADMIN">Admin</option>
            </select>
            <button onclick="createUser()" class="save-btn" style="margin: 0;">Create User</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
